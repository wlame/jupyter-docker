name: 'Build and Test Docker Target'
description: >
  Build a single Docker target with registry layer-caching, run its test suite,
  scan it with Trivy, and optionally push it (plus a :target-<sha> tag) to ghcr.io.

inputs:
  target:
    description: 'Docker build target name (base, scientific, ml, …)'
    required: true
  cache-scopes:
    description: 'Extra cache scope names beyond this target, space-separated (e.g. "base scientific")'
    required: false
    default: ''
  push:
    description: 'Push the image to ghcr.io after tests pass (true/false)'
    required: false
    default: 'false'
  image-name:
    description: 'Full image name without tag (e.g. ghcr.io/owner/repo)'
    required: true
  registry-token:
    description: 'Token for ghcr.io authentication (usually secrets.GITHUB_TOKEN)'
    required: true
  free-disk-space:
    description: 'Remove unused preinstalled toolchains first (for multi-GB targets)'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Free disk space
      if: inputs.free-disk-space == 'true'
      shell: bash
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
          /opt/hostedtoolcache/CodeQL /usr/local/share/boost
        df -h /

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

    # Login before the build: pulls the registry build cache, and lets
    # cache-to write it back on main. PR tokens are read-only, which is enough
    # for cache-from.
    - name: Login to ghcr.io
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ inputs.registry-token }}

    - name: Compose cache references
      id: cache
      shell: bash
      env:
        IMAGE: ${{ inputs.image-name }}
        TARGET: ${{ inputs.target }}
        EXTRA_SCOPES: ${{ inputs.cache-scopes }}
        PUSH: ${{ inputs.push }}
      run: |
        {
          echo 'cache_from<<EOF'
          echo "type=registry,ref=${IMAGE}/buildcache:${TARGET}"
          for scope in ${EXTRA_SCOPES}; do
            echo "type=registry,ref=${IMAGE}/buildcache:${scope}"
          done
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
        if [ "${PUSH}" = "true" ]; then
          echo "cache_to=type=registry,ref=${IMAGE}/buildcache:${TARGET},mode=max" >> "$GITHUB_OUTPUT"
        else
          echo "cache_to=" >> "$GITHUB_OUTPUT"
        fi

    - name: Build ${{ inputs.target }}
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
      with:
        context: .
        target: ${{ inputs.target }}
        tags: ds-${{ inputs.target }}
        load: true
        cache-from: ${{ steps.cache.outputs.cache_from }}
        cache-to: ${{ steps.cache.outputs.cache_to }}

    - name: Test ${{ inputs.target }}
      shell: bash
      run: ./build-all.sh --test-only ${{ inputs.target }}

    # Report-only for now: surfaces HIGH/CRITICAL CVEs in the job log without
    # blocking the pipeline. Tighten to exit-code 1 once a baseline is triaged.
    - name: Scan ${{ inputs.target }} with Trivy
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        image-ref: ds-${{ inputs.target }}
        severity: CRITICAL,HIGH
        ignore-unfixed: true
        exit-code: '0'
        # Multi-GB ML images (deeplearn, face, full) exceed Trivy's 5m default.
        timeout: 30m

    - name: Push ${{ inputs.target }} to ghcr.io
      if: inputs.push == 'true'
      shell: bash
      env:
        IMAGE: ${{ inputs.image-name }}
        TARGET: ${{ inputs.target }}
      run: |
        SHORT_SHA="${GITHUB_SHA::7}"
        docker tag "ds-${TARGET}" "${IMAGE}:${TARGET}"
        docker tag "ds-${TARGET}" "${IMAGE}:${TARGET}-${SHORT_SHA}"
        # ghcr occasionally races on blobs shared between parallel jobs
        # ("unknown blob"); a short retry rides it out.
        for attempt in 1 2 3; do
          if docker push "${IMAGE}:${TARGET}" && docker push "${IMAGE}:${TARGET}-${SHORT_SHA}"; then
            exit 0
          fi
          echo "push attempt ${attempt} failed; retrying in $((attempt * 20))s"
          sleep $((attempt * 20))
        done
        echo "all push attempts failed"
        exit 1
