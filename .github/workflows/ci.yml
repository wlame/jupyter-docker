name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly rebuild so published images pick up OS security patches.
  schedule:
    - cron: '30 5 * * 1'
  workflow_dispatch:

# Cancel in-flight PR runs on new pushes; never cancel a main publish mid-flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:

  # ─── Tier 0 — fast gates (no Docker builds) ─────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: "0.11.28"
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - name: Lint shell and Python
        run: just lint
      - name: hadolint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008
          failure-threshold: warning

  consistency:
    name: consistency
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: "0.11.28"
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - name: Verify generated files match the matrix
        run: just gen-check
      - name: Verify lockfiles are up to date
        run: just lock-check
      - name: Verify notebooks are in sync with .py sources
        run: just nb-check
      - name: Run generator tests
        run: just test-gen

  # ─── Tier 1 ──────────────────────────────────────────────────────────────────
  base:
    name: base
    needs: [lint, consistency]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/build-and-test
        with:
          target: base
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

  # ─── Tier 2 — parallel, all FROM base ────────────────────────────────────────
  scientific:
    name: scientific
    needs: base
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/build-and-test
        with:
          target: scientific
          cache-scopes: base
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

  visualization:
    name: visualization
    needs: base
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/build-and-test
        with:
          target: visualization
          cache-scopes: base
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

  dataio:
    name: dataio
    needs: base
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/build-and-test
        with:
          target: dataio
          cache-scopes: base
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

  vision:
    name: vision
    needs: base
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/build-and-test
        with:
          target: vision
          cache-scopes: base
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

  audio:
    name: audio
    needs: base
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/build-and-test
        with:
          target: audio
          cache-scopes: base
          free-disk-space: 'true'
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

  nlp:
    name: nlp
    needs: base
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/build-and-test
        with:
          target: nlp
          cache-scopes: base
          free-disk-space: 'true'
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

  speech:
    name: speech
    needs: base
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/build-and-test
        with:
          target: speech
          cache-scopes: base
          free-disk-space: 'true'
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

  face:
    name: face
    needs: base
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/build-and-test
        with:
          target: face
          cache-scopes: base
          free-disk-space: 'true'
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

  # ─── Tier 3 — parallel, FROM scientific ──────────────────────────────────────
  ml:
    name: ml
    needs: scientific
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/build-and-test
        with:
          target: ml
          cache-scopes: base scientific
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

  geospatial:
    name: geospatial
    needs: scientific
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/build-and-test
        with:
          target: geospatial
          cache-scopes: base scientific
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

  timeseries:
    name: timeseries
    needs: scientific
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/build-and-test
        with:
          target: timeseries
          cache-scopes: base scientific
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

  # ─── Tier 4 — heavyweight images ─────────────────────────────────────────────
  deeplearn:
    name: deeplearn
    needs: ml
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/build-and-test
        with:
          target: deeplearn
          cache-scopes: base scientific ml
          free-disk-space: 'true'
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

  full:
    name: full
    needs: base
    runs-on: ubuntu-latest
    timeout-minutes: 120
