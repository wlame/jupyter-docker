# =============================================================================
# Dependency matrix — single source of truth for all Docker targets.
#
# Edit this file, then regenerate the per-target pyproject.toml and
# verify_imports.py files with:
#
#     python3 scripts/gen_targets.py        # rewrite generated files
#     python3 scripts/gen_targets.py --check # verify nothing drifted (CI)
#
# Semantics:
#   * A package is installed in every target listed in introduced-by and in
#     all descendants of those targets (see [targets.*] parent chains).
#   * The "full" target always contains every package in this file.
#   * overrides pin a different version for specific targets; remove an
#     override once the constraint that forced it is gone.
# =============================================================================

[settings]
requires-python = ">=3.13"
# Supply-chain guard: never resolve packages published after this date.
exclude-newer = "2026-07-04"

# --- Target tree -------------------------------------------------------------

[targets.base]
parent = ""
description = "Base Python environment with common utilities for data science"

[targets.scientific]
parent = "base"
description = "Scientific computing with NumPy, SciPy, and Pandas"

[targets.visualization]
parent = "base"
description = "Data visualization with Matplotlib, Seaborn, Plotly, and Bokeh"

[targets.dataio]
parent = "base"
description = "Data I/O for Parquet, HDF5, Excel, and databases"

[targets.ml]
parent = "scientific"
description = "Classical machine learning with scikit-learn, XGBoost, and LightGBM"

[targets.deeplearn]
parent = "ml"
description = "Deep learning with PyTorch and TensorFlow"

[targets.vision]
parent = "base"
description = "Computer vision and image processing"

[targets.audio]
parent = "base"
description = "Audio processing and analysis"

[targets.geospatial]
parent = "scientific"
description = "Geospatial analysis and mapping"

[targets.timeseries]
parent = "scientific"
description = "Time series analysis and forecasting"

[targets.nlp]
parent = "base"
description = "Natural language processing"

[targets.speech]
parent = "base"
description = "Speech recognition and text-to-speech synthesis"

[targets.face]
parent = "base"
description = "Face detection, recognition, analysis, and generation"

[targets.full]
parent = ""
description = "Complete data science environment with all libraries"

